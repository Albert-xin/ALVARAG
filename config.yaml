# 全局配置

# 日志配置
logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(trace_id)s - %(module)s - %(message)s"
  json_format: false
  log_dir: logs
  rotation:
    enabled: true
    when: H
    interval: 1
    backup_count: 7
    max_size: 10485760  # 10MB in bytes
  environments:
    development:
      level: DEBUG
    production:
      level: INFO

# 数据库配置
database:
  host: localhost
  port: 3306
  user: root
  password: password
  name: alvarag

# 向量数据库配置
milvus:
  host: localhost
  port: 19530
  user: root
  password: milvus
  database: default
  collection: document_vectors

# 设备配置
device: auto

# 文件处理配置
file_threshold_gb: 1.0

# 分块配置
chunk_size: 512
overlap: 128

# 批处理配置
batch_size: 32
max_concurrency: 4

# 超时配置
timeout_seconds: 300

# 模型路径配置
model_paths:
  embedding: models/embedding
  rerank: models/rerank
  llm: models/llm
  intent: models/intent

# 模型配置
embedding:
  precision: fp16
  max_length: 512

rerank:
  precision: fp16
  max_length: 512

llm:
  precision: fp16
  max_length: 4096

intent:
  confidence_threshold: 0.7
  default_intent: "rag_query"
  max_history_rounds: 5
  coherence_threshold: 0.3
  prediction_threshold: 0.7